<!DOCTYPE html>
<html>
  <head>
    <script>
      (function () {
        var s = document.createElement('script');
        s.src = 'https://unpkg.com/@grafana/faro-web-sdk@2/dist/bundle/faro-web-sdk.iife.js';
        s.onload = function () {
          window.GrafanaFaroWebSdk.initializeFaro({
            url: 'https://faro-collector-prod-us-central-0.grafana.net/collect/5672b78e8dc0c9665bb41a639dbacf13',
            app: { name: 'Vardan Torosyan', version: '1.0.0', environment: 'production' },
            experimental: { trackNavigation: true },
          });
          var t = document.createElement('script');
          t.src = 'https://unpkg.com/@grafana/faro-web-tracing@2/dist/bundle/faro-web-tracing.iife.js';
          t.onload = function () {
            window.GrafanaFaroWebSdk.faro.instrumentations.add(new window.GrafanaFaroWebTracing.TracingInstrumentation());
          };
          document.head.appendChild(t);
          var r = document.createElement('script');
          r.src = 'https://unpkg.com/@grafana/faro-instrumentation-replay@2/dist/bundle/faro-instrumentation-replay.iife.js';
          r.onload = function () {
            window.GrafanaFaroWebSdk.faro.instrumentations.add(new window.GrafanaFaroInstrumentationReplay.ReplayInstrumentation());
          };
          document.head.appendChild(r);
        };
        document.head.appendChild(s);
      })();
    </script>

    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
    <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

    <!-- Created with Jekyll Now - http://github.com/barryclark/jekyll-now -->
  </head>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">          
           
          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/about">About</a>
            <a href="{{ site.baseurl }}/vardan_torosyan_cv">CV</a>
            <a href="https://vtorosyan.github.io/em-meditations/" target="_blank" rel="noopener">Meditations</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>
  </body>
</html>
